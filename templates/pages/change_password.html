<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - Nodectl</title>
    <style>
        :root { --bg: #f5f5f7; --text: #1d1d1f; --blue: #0071e3; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .modal-card { background: #ffffff; width: 100%; max-width: 400px; padding: 40px; border-radius: 24px; box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); text-align: center; }
        
        .header h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
        .header p { font-size: 14px; color: #86868b; margin-bottom: 30px; }

        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group input { width: 100%; padding: 14px 16px; font-size: 15px; background-color: rgba(0, 0, 0, 0.04); border: 1px solid transparent; border-radius: 12px; transition: all 0.2s; outline: none; }
        .input-group input:focus { background-color: #ffffff; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15); }

        .btn-submit { width: 100%; padding: 14px; font-size: 16px; font-weight: 500; background-color: var(--blue); color: white; border: none; border-radius: 12px; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .btn-submit:hover { background-color: #0077ed; }
        
        .btn-back { display: block; margin-top: 20px; font-size: 14px; color: var(--blue); text-decoration: none; font-weight: 500; }
        .btn-back:hover { text-decoration: underline; }

        .msg-box { padding: 12px; border-radius: 10px; font-size: 14px; font-weight: 500; margin-bottom: 20px; }
        .msg-error { background-color: #fff0f0; color: #e30000; animation: shake 0.4s ease-in-out; }
        .msg-success { background-color: #e8f5e9; color: #34c759; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px); }
            40% { transform: translateX(4px); }
            60% { transform: translateX(-2px); }
            80% { transform: translateX(2px); }
        }
    </style>
</head>
<body>
    <div class="modal-card">
        <div class="header">
            <h1>修改管理员密码</h1>
            <p>为了您的系统安全，请定期更换密码</p>
        </div>

        {{if .Error}} <div class="msg-box msg-error">{{.Error}}</div> {{end}}
        
        {{if .Success}} 
            <div class="msg-box msg-success">{{.Success}}</div> 
            <a href="/login" class="btn-submit" style="text-decoration: none; display: inline-block;">前往重新登录</a>
        {{else}}
            <form method="POST" action="/change-password">
                <div class="input-group">
                    <input type="password" name="old_password" placeholder="当前密码" required>
                </div>
                <div class="input-group">
                    <input type="password" name="new_password" placeholder="新密码" required minlength="5">
                </div>
                <div class="input-group">
                    <input type="password" name="confirm_password" placeholder="确认新密码" required minlength="5">
                </div>
                <button type="submit" class="btn-submit">确认修改</button>
            </form>
            <a href="/" class="btn-back">返回仪表盘</a>
        {{end}}
    </div>
</body>
</html>
